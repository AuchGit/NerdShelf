name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Desktop (Windows) ────────────────────────────────────────────────────
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Vite build needs Supabase env vars baked in at build time
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NerdShelf ${{ github.ref_name }}'
          releaseBody: 'Siehe Asset `latest.json` für Update-Details.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ── Android APK ──────────────────────────────────────────────────────────
  publish-android:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Set NDK env
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: android

      - name: Install frontend dependencies
        run: npm ci

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/gen/android/app
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/release.keystore

      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > src-tauri/gen/android/app/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build Android APKs
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run tauri android build -- --apk --split-per-abi

      - name: Locate APK outputs
        id: apks
        run: |
          OUT_DIR="src-tauri/gen/android/app/build/outputs/apk"
          echo "Listing APK outputs:"
          find "$OUT_DIR" -name "*.apk" -print
          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Sign APKs with Tauri updater key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Install the Tauri signer CLI
          npm install -g @tauri-apps/cli

          OUT_DIR="${{ steps.apks.outputs.out_dir }}"
          STAGE_DIR="android-release"
          mkdir -p "$STAGE_DIR"

          # Map Gradle ABI dir → Tauri updater arch key
          declare -A ABI_MAP=(
            ["arm64-v8a"]="aarch64"
            ["armeabi-v7a"]="armv7"
            ["x86"]="i686"
            ["x86_64"]="x86_64"
          )

          # Copy + sign each per-ABI release APK
          for ABI in "${!ABI_MAP[@]}"; do
            ARCH="${ABI_MAP[$ABI]}"
            SRC=$(find "$OUT_DIR/${ABI}/release" -name "*.apk" 2>/dev/null | head -n1 || true)
            if [ -z "$SRC" ]; then
              echo "WARN: no APK found for $ABI"
              continue
            fi
            DST="$STAGE_DIR/NerdShelf_${{ github.ref_name }}_android-${ARCH}.apk"
            cp "$SRC" "$DST"
            echo "Signing $DST"
            npx @tauri-apps/cli signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$DST"
          done

          ls -la "$STAGE_DIR"
          echo "stage_dir=$STAGE_DIR" >> "$GITHUB_OUTPUT"
        id: sign

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            android-release/*.apk
            android-release/*.apk.sig

      - name: Patch latest.json with Android entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/patch-android-updater.mjs "${{ github.ref_name }}" "${{ github.repository }}" "android-release"
